name: Placi
options:
  bundleIdPrefix: com.placi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_STRICT_CONCURRENCY: "complete"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Placi uses your location to show nearby places on the map."
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Placi needs access to your photos to attach them to your posts."
    INFOPLIST_KEY_NSCameraUsageDescription: "Placi needs camera access to take photos for your posts."

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI
    from: "3.0.0"

targets:
  Placi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Placi
    resources:
      - path: Placi/Assets.xcassets
      - path: Placi/Fonts
        optional: true
    plist:
      path: Placi/Info.plist
      properties:
        CFBundleDisplayName: Placi
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - placi
        LSApplicationQueriesSchemes:
          - comgooglemaps
          - googlemaps
    dependencies:
      - package: Supabase
        product: Supabase
      - package: SDWebImageSwiftUI
      - sdk: AuthenticationServices.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
    entitlements:
      path: Placi/Placi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dukemdiamond.placi
        INFOPLIST_FILE: Placi/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
